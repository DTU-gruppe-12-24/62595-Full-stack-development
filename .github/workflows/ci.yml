name: FULL Stack CI
on:
  push:
    branches: [ "main", "playwright" ]
  pull_request:
    branches: [ "**" ]


jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: mvn -q -DskipTests install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        
      - name: Start backend (test profile)
        working-directory: backend
        run: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dspring.profiles.active=test -Dspring.devtools.restart.enabled=false" &

      - name: Wait for site to be ready
        run: |
          echo "Waiting for site..."
          for i in $(seq 1 10);
          do
              if curl -s http://localhost:8080/actuator/health; then break; fi
              sleep 2
          done

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:all

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 30

